services:
  - type: web
    name: expodirectory
    env: node
    plan: free # Can be upgraded if memory is an issue
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: GEMINI_API_KEY
        sync: false # User will set this in Render dashboard
      - key: MONGODB_URI
        sync: false # User will set this in Render dashboard (or use a placeholder)
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable
    # Add a disk if background scraping needs persistence across restarts,
    # but for a free app, we'll stick to memory-based cache for now.
